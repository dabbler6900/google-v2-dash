# guardrails.yaml
# Rules and prohibitions
# What must not happen.

banned_tasks:
  - bypass_dry_run
  - force_delete_protected
  - create_unregistered_domain
  - mutate_governance_without_trace

banned_projects:
  - legacy_test_project
  - unauthorized_crypto_miner
  - random_test_folder

anti_drift:
  - no_duplicate_domains: true
  - no_alternate_naming: true
  - no_nested_pseudo_workspaces: true
  - no_duplicate_governance_filenames: true
